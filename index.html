<!DOCTYPE html>
<html>
<head>
  <title>Notification App</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

  <h2>Click Button for Notification 🔔</h2>
  
  <button onclick="showNotification()" 
    style="padding:15px 30px; font-size:18px; cursor:pointer;">
    Click Me
  </button>

  <script>
    function showNotification() {

      // Check browser support
      if (!("Notification" in window)) {
        alert("Browser does not support notifications");
      }

      // Ask permission
      else if (Notification.permission === "default") {
        Notification.requestPermission().then(function(permission) {
          if (permission === "granted") {
            new Notification("Hello Safin 👋", {
              body: "Button click hua! 🔥",
              icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
            });
          }
        });
      }

      // Already allowed
      else if (Notification.permission === "granted") {
        new Notification("Hello Safin 👋", {
          body: "Button click hua! 🔥",
          icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
        });
      }

      // Blocked
      else {
        alert("Notification blocked 😢");
      }
    }
  </script>

</body>
</html>
